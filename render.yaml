# render.yaml - provisions web service + free PostgreSQL, wires DATABASE_URL automatically

services:
  - type: web
    name: ticketdesk
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ticketdesk-db
          property: connectionString
    plan: free

databases:
  - name: ticketdesk-db
    plan: free
