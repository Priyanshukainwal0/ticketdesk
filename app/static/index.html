<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TicketDesk</title>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────── */
    :root {
      --bg:         #0d1117;   /* GitHub dark-ish surface              */
      --surface:    #161b22;   /* card / panel background              */
      --border:     #30363d;   /* subtle separator                     */
      --accent:     #58a6ff;   /* primary interactive blue             */
      --accent-dim: #1f3a5f;   /* accent background wash               */
      --text:       #e6edf3;   /* primary text                         */
      --muted:      #8b949e;   /* secondary / placeholder text         */
      --radius:     8px;

      /* Priority colours */
      --p-low:      #3fb950;   /* green  */
      --p-medium:   #d29922;   /* amber  */
      --p-high:     #f85149;   /* red    */
      --p-urgent:   #ff7b72;   /* bright red */

      /* Status colours */
      --s-open:        #58a6ff;
      --s-in_progress: #a371f7;
      --s-resolved:    #3fb950;
      --s-closed:      #6e7681;
    }

    /* ── Reset & base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ───────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -.3px;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    .badge-count {
      background: var(--accent-dim);
      color: var(--accent);
      font-size: .72rem;
      font-weight: 600;
      padding: .1rem .5rem;
      border-radius: 20px;
      border: 1px solid rgba(88,166,255,.3);
      min-width: 24px;
      text-align: center;
      transition: background .2s;
    }

    /* ── Layout ────────────────────────────────────────────────────── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      height: calc(100vh - 52px);
      overflow: hidden;
    }

    /* ── Left panel — new ticket form ──────────────────────────────── */
    .panel-form {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .panel-form h2 {
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    label {
      display: flex;
      flex-direction: column;
      gap: .35rem;
      font-size: .82rem;
      color: var(--muted);
      font-weight: 500;
    }
    label .req { color: var(--p-high); margin-left: 2px; }

    input, textarea, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: .9rem;
      padding: .5rem .75rem;
      font-family: inherit;
      transition: border-color .15s;
      outline: none;
      width: 100%;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,166,255,.15);
    }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: var(--surface); }

    .btn {
      padding: .55rem 1.1rem;
      border-radius: var(--radius);
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      background: var(--accent);
      color: #0d1117;
      width: 100%;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

    #form-error {
      font-size: .8rem;
      color: var(--p-high);
      min-height: 1rem;
    }
    #form-success {
      font-size: .8rem;
      color: var(--p-low);
      min-height: 1rem;
    }

    /* ── Right panel — ticket queue ────────────────────────────────── */
    .panel-queue {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .queue-toolbar {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: .3rem .75rem;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all .15s;
    }
    .filter-btn:hover  { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .queue-list {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    /* ── Ticket card ───────────────────────────────────────────────── */
    .ticket-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .35rem .75rem;
      transition: border-color .15s, box-shadow .15s;
    }
    .ticket-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-dim);
    }
    /* Left border = priority colour */
    .ticket-card[data-priority="low"]    { border-left: 3px solid var(--p-low); }
    .ticket-card[data-priority="medium"] { border-left: 3px solid var(--p-medium); }
    .ticket-card[data-priority="high"]   { border-left: 3px solid var(--p-high); }
    .ticket-card[data-priority="urgent"] { border-left: 3px solid var(--p-urgent);
                                           background: rgba(248,81,73,.04); }

    .ticket-title {
      font-size: .92rem;
      font-weight: 600;
      color: var(--text);
      grid-column: 1;
    }
    .ticket-meta {
      font-size: .75rem;
      color: var(--muted);
      grid-column: 1;
    }
    .ticket-badges {
      grid-column: 2;
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: .3rem;
    }
    .pill {
      font-size: .68rem;
      font-weight: 600;
      padding: .18rem .55rem;
      border-radius: 20px;
      white-space: nowrap;
    }
    .pill-status-open        { background: rgba(88,166,255,.15);  color: var(--s-open); }
    .pill-status-in_progress { background: rgba(163,113,247,.15); color: var(--s-in_progress); }
    .pill-status-resolved    { background: rgba(63,185,80,.15);   color: var(--s-resolved); }
    .pill-status-closed      { background: rgba(110,118,129,.15); color: var(--s-closed); }
    .pill-priority-low       { background: rgba(63,185,80,.12);   color: var(--p-low); }
    .pill-priority-medium    { background: rgba(210,153,34,.12);  color: var(--p-medium); }
    .pill-priority-high      { background: rgba(248,81,73,.12);   color: var(--p-high); }
    .pill-priority-urgent    { background: rgba(255,123,114,.18); color: var(--p-urgent); }

    .ticket-actions {
      grid-column: 1 / -1;
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      margin-top: .35rem;
    }
    .action-select {
      font-size: .75rem;
      padding: .2rem .45rem;
      border-radius: 6px;
    }
    .btn-delete {
      font-size: .75rem;
      padding: .2rem .6rem;
      border-radius: 6px;
      background: rgba(248,81,73,.15);
      color: var(--p-high);
      border: 1px solid rgba(248,81,73,.3);
      cursor: pointer;
      font-weight: 600;
      transition: background .15s;
    }
    .btn-delete:hover { background: rgba(248,81,73,.3); }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: .5rem;
      font-size: .9rem;
    }
    .empty-state svg { opacity: .25; }

    /* ── Responsive ────────────────────────────────────────────────── */
    @media (max-width: 720px) {
      main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; overflow: visible; }
      .panel-form { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Ticket<span>Desk</span></div>
  <div class="badge-count" id="badge-count">0</div>
</header>

<main>
  <!-- ── New Ticket Form ── -->
  <aside class="panel-form">
    <h2>New Ticket</h2>

    <label>
      Title <span class="req">*</span>
      <input id="f-title" type="text" placeholder="Brief summary of the issue" maxlength="200" />
    </label>

    <label>
      Description
      <textarea id="f-desc" placeholder="Steps to reproduce, error messages, context…" maxlength="4000"></textarea>
    </label>

    <label>
      Requester <span class="req">*</span>
      <input id="f-requester" type="text" placeholder="Name or email" maxlength="100" />
    </label>

    <label>
      Assignee
      <input id="f-assignee" type="text" placeholder="Who should own this?" maxlength="100" />
    </label>

    <label>
      Priority
      <select id="f-priority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
        <option value="urgent">Urgent</option>
      </select>
    </label>

    <button class="btn btn-primary" id="submit-btn" onclick="submitTicket()">
      Open Ticket
    </button>

    <div id="form-error"></div>
    <div id="form-success"></div>
  </aside>

  <!-- ── Ticket Queue ── -->
  <section class="panel-queue">
    <div class="queue-toolbar">
      <button class="filter-btn active" data-status="" onclick="setFilter(this, '')">All</button>
      <button class="filter-btn" data-status="open" onclick="setFilter(this, 'open')">Open</button>
      <button class="filter-btn" data-status="in_progress" onclick="setFilter(this, 'in_progress')">In Progress</button>
      <button class="filter-btn" data-status="resolved" onclick="setFilter(this, 'resolved')">Resolved</button>
      <button class="filter-btn" data-status="closed" onclick="setFilter(this, 'closed')">Closed</button>
    </div>
    <div class="queue-list" id="queue-list">
      <!-- Tickets rendered here by JS -->
    </div>
  </section>
</main>

<script>
  /* ── State ────────────────────────────────────────────────────────── */
  let currentFilter = "";

  /* ── Helpers ──────────────────────────────────────────────────────── */

  /** Safely escape text for insertion into the DOM. */
  function esc(text) {
    const d = document.createElement("div");
    d.textContent = String(text ?? "");
    return d.innerHTML;
  }

  function fmt(isoString) {
    if (!isoString) return "";
    try {
      return new Date(isoString).toLocaleString(undefined, {
        month: "short", day: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
    } catch { return isoString; }
  }

  function showError(msg) {
    document.getElementById("form-error").textContent = msg;
    document.getElementById("form-success").textContent = "";
  }
  function showSuccess(msg) {
    document.getElementById("form-success").textContent = msg;
    document.getElementById("form-error").textContent = "";
    setTimeout(() => {
      document.getElementById("form-success").textContent = "";
    }, 3000);
  }

  /* ── Render ───────────────────────────────────────────────────────── */

  function renderTickets(tickets) {
    const list = document.getElementById("queue-list");
    document.getElementById("badge-count").textContent = tickets.length;

    if (!tickets.length) {
      list.innerHTML = `
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
                     M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <span>No tickets found.</span>
        </div>`;
      return;
    }

    /* Build HTML with textContent via esc() — no XSS risk */
    list.innerHTML = tickets.map(t => `
      <div class="ticket-card" data-priority="${esc(t.priority)}" data-id="${esc(t.id)}">
        <div class="ticket-title">#${esc(t.id)} — ${esc(t.title)}</div>
        <div class="ticket-badges">
          <span class="pill pill-status-${esc(t.status)}">${esc(t.status.replace("_"," "))}</span>
          <span class="pill pill-priority-${esc(t.priority)}">${esc(t.priority)}</span>
        </div>
        <div class="ticket-meta">
          ${esc(t.requester)}
          ${t.assignee ? " → " + esc(t.assignee) : ""}
          &nbsp;·&nbsp; ${fmt(t.created_at)}
        </div>
        <div class="ticket-actions">
          <select class="action-select" onchange="updateStatus(${esc(t.id)}, this.value)">
            <option value="">Change status…</option>
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Closed</option>
          </select>
          <button class="btn-delete" onclick="deleteTicket(${esc(t.id)})">Delete</button>
        </div>
      </div>`
    ).join("");
  }

  /* ── API calls ────────────────────────────────────────────────────── */

  async function loadTickets() {
    const url = currentFilter
      ? `/api/tickets?status=${encodeURIComponent(currentFilter)}`
      : "/api/tickets";
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      renderTickets(await res.json());
    } catch (e) {
      console.error("loadTickets:", e);
    }
  }

  async function submitTicket() {
    const title     = document.getElementById("f-title").value.trim();
    const desc      = document.getElementById("f-desc").value.trim();
    const requester = document.getElementById("f-requester").value.trim();
    const assignee  = document.getElementById("f-assignee").value.trim();
    const priority  = document.getElementById("f-priority").value;

    if (!title)     { showError("Title is required."); return; }
    if (!requester) { showError("Requester is required."); return; }
    showError("");

    const btn = document.getElementById("submit-btn");
    btn.disabled = true;

    try {
      const res = await fetch("/api/tickets", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title, description: desc, requester,
          assignee: assignee || null, priority
        }),
      });
      if (!res.ok) {
        const body = await res.json();
        showError(body.detail ?? "Could not create ticket.");
        return;
      }
      /* Reset form */
      ["f-title","f-desc","f-requester","f-assignee"].forEach(id => {
        document.getElementById(id).value = "";
      });
      document.getElementById("f-priority").value = "medium";
      showSuccess("Ticket opened!");
      loadTickets();
    } catch (e) {
      showError("Network error — is the API running?");
    } finally {
      btn.disabled = false;
    }
  }

  async function updateStatus(id, status) {
    if (!status) return;
    try {
      const res = await fetch(`/api/tickets/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      loadTickets();
    } catch (e) {
      console.error("updateStatus:", e);
    }
  }

  async function deleteTicket(id) {
    if (!confirm(`Delete ticket #${id}?`)) return;
    try {
      const res = await fetch(`/api/tickets/${id}`, { method: "DELETE" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      loadTickets();
    } catch (e) {
      console.error("deleteTicket:", e);
    }
  }

  function setFilter(btn, status) {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = status;
    loadTickets();
  }

  /* ── Boot ─────────────────────────────────────────────────────────── */
  loadTickets();
  /* Refresh the queue every 30 seconds so multi-user state stays fresh */
  setInterval(loadTickets, 30_000);
</script>
</body>
</html>
